# Copy to `doppler.yaml` in this directory (gitignored). Then `pnpm run dev:showcase`
# and other `doppler run -- …` scripts use the right project/config.
#
# Replace `project` with your Doppler app name (`doppler setup` after `pnpm run setup`).
# Narduk hub: `narduk-nuxt-template` (dev config should include APPLE_* for MapKit showcase).
#
# NUXT_PORT is randomly assigned by `pnpm run setup` and written to the Doppler
# `dev` config so each app gets a unique local dev-server port (range 3200–6199).
setup:
  project: narduk-nuxt-template
  config: dev
