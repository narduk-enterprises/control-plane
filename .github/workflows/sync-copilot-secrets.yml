name: Sync Copilot Secrets

on:
  workflow_dispatch:
    inputs:
      app-name:
        description: "Optional fleet app slug to sync. Leave blank to sync all active apps."
        required: false
        type: string
        default: ""
      github-repo:
        description: "Optional OWNER/REPO override for single-app runs."
        required: false
        type: string
        default: ""
      dry-run:
        description: "Preview the Doppler → GitHub mapping without changing GitHub."
        required: false
        type: boolean
        default: false
      all-secrets:
        description: "Sync every non-DOPPLER_* key from prd_copilot instead of the minimal set."
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "17 6 * * *"

concurrency:
  group: sync-copilot-secrets
  cancel-in-progress: false

env:
  NUXT_TELEMETRY_DISABLED: 1

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Fetch control-plane secrets from Doppler
        uses: dopplerhq/secrets-fetch-action@v2.0.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          inject-env-vars: true

      - name: Normalize sync runner env
        shell: bash
        run: |
          set -euo pipefail

          gh_service_token="${GH_SERVICE_TOKEN:-${CONTROL_PLANE_GH_SERVICE_TOKEN:-}}"
          if [[ -z "$gh_service_token" ]]; then
            echo "::error::Missing GH service token. Set GH_SERVICE_TOKEN or CONTROL_PLANE_GH_SERVICE_TOKEN in control-plane Doppler."
            exit 1
          fi
          echo "GH_SERVICE_TOKEN=$gh_service_token" >> "$GITHUB_ENV"

          if [[ -z "${CONTROL_PLANE_API_KEY:-${FLEET_API_KEY:-}}" ]]; then
            echo "::error::Missing CONTROL_PLANE_API_KEY or FLEET_API_KEY in control-plane Doppler config."
            exit 1
          fi

          for key in CONTROL_PLANE_URL DOPPLER_API_TOKEN; do
            if [[ -z "${!key:-}" ]]; then
              echo "::error::Missing $key in control-plane Doppler config."
              exit 1
            fi
          done

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Doppler CLI
        run: |
          curl -Ls https://cli.doppler.com/install.sh | sudo sh
          doppler --version

      - name: Configure GitHub Packages auth
        shell: bash
        run: |
          set -euo pipefail
          token="${GH_PACKAGES_TOKEN:-${GITHUB_PACKAGES_TOKEN:-${GITHUB_TOKEN_PACKAGES_READ:-}}}"
          if [[ -n "$token" ]]; then
            echo "//npm.pkg.github.com/:_authToken=${token}" >> "$HOME/.npmrc"
          fi

      - name: Install control-plane dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync targeted app
        if: github.event_name == 'workflow_dispatch' && inputs.app-name != ''
        shell: bash
        run: |
          set -euo pipefail
          cmd=(pnpm exec tsx tools/sync-fleet-copilot-envs.ts "--app-name=${{ inputs.app-name }}")
          if [[ -n "${{ inputs.github-repo }}" ]]; then
            cmd+=("--github-repo=${{ inputs.github-repo }}")
          fi
          if [[ "${{ inputs.all-secrets }}" == 'true' ]]; then
            cmd+=("--all-secrets")
          fi
          if [[ "${{ inputs.dry-run }}" == 'true' ]]; then
            cmd+=("--dry-run")
          fi
          "${cmd[@]}"

      - name: Sync all active apps
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.app-name == '')
        shell: bash
        run: |
          set -euo pipefail
          cmd=(pnpm exec tsx tools/sync-fleet-copilot-envs.ts)
          if [[ "${{ github.event_name }}" == 'workflow_dispatch' && "${{ inputs.all-secrets }}" == 'true' ]]; then
            cmd+=("--all-secrets")
          fi
          if [[ "${{ github.event_name }}" == 'workflow_dispatch' && "${{ inputs.dry-run }}" == 'true' ]]; then
            cmd+=("--dry-run")
          fi
          "${cmd[@]}"
