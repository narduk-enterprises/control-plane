name: Provision App

on:
  workflow_dispatch:
    inputs:
      app-name:
        description: "Lowercase kebab-case app slug (e.g. my-cool-app)"
        required: true
        type: string
      display-name:
        description: "Human-readable display name (e.g. My Cool App)"
        required: true
        type: string
      app-url:
        description: "Production URL (e.g. https://my-cool-app.nard.uk)"
        required: true
        type: string
      app-short-description:
        description: "Short summary for GitHub repo metadata and starter app description"
        required: false
        type: string
        default: ""
      nuxt-port:
        description: "Assigned local Nuxt dev port (stored in Doppler dev as NUXT_PORT)"
        required: false
        type: string
        default: ""
      github-repo:
        description: "Full GitHub repo path (e.g. narduk-enterprises/my-cool-app)"
        required: true
        type: string
      provision-id:
        description: "Control plane provision job ID for status callbacks"
        required: true
        type: string
      d1-database-id:
        description: "Pre-provisioned D1 database UUID (passed through to hydrate / wrangler)"
        required: false
        type: string
        default: ""
      d1-database-name:
        description: "Pre-provisioned D1 database name"
        required: false
        type: string
        default: ""
      kv-namespace-id:
        description: "Pre-provisioned Workers KV production namespace id (wrangler kv_namespaces[].id for binding KV)"
        required: false
        type: string
        default: ""
      kv-preview-namespace-id:
        description: "Pre-provisioned Workers KV preview namespace id (wrangler preview_id for local dev)"
        required: false
        type: string
        default: ""
      ga-property-id:
        description: "Pre-provisioned GA4 property ID (skip analytics creation when set)"
        required: false
        type: string
        default: ""
      ga-measurement-id:
        description: "Pre-provisioned GA4 measurement ID (G-XXXXXXX)"
        required: false
        type: string
        default: ""
      gsc-verification-file:
        description: "GSC verification filename (e.g. google1234.html)"
        required: false
        type: string
        default: ""
      gsc-verification-content:
        description: "GSC verification file content"
        required: false
        type: string
        default: ""
      indexnow-key:
        description: "Pre-generated IndexNow API key"
        required: false
        type: string
        default: ""
      app-description:
        description: "Long agent brief used for provision.json, SPEC.md, and downstream GitHub agent workflows"
        required: false
        type: string
        default: ""

concurrency:
  group: provision-${{ github.event.inputs.app-name }}
  cancel-in-progress: false

env:
  NUXT_TELEMETRY_DISABLED: 1
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  provision:
    name: "Provision ${{ github.event.inputs.app-name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    env:
      PROVISION_ID: ${{ inputs.provision-id }}
    steps:
      - name: Validate inputs
        run: |
          if ! echo "${{ inputs.app-name }}" | grep -qP '^[a-z0-9][a-z0-9-]*$'; then
            echo "::error::Invalid app-name: must match /^[a-z0-9][a-z0-9-]*$/"
            exit 1
          fi
          echo "📦 Provisioning: ${{ inputs.display-name }} (${{ inputs.app-name }})"
          echo "   URL: ${{ inputs.app-url }}"
          echo "   Repo: ${{ inputs.github-repo }}"
          echo "   Provision ID: ${{ inputs.provision-id }}"

      - uses: actions/checkout@v4

      - name: Fetch control-plane secrets from Doppler
        uses: dopplerhq/secrets-fetch-action@v2.0.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          inject-env-vars: true

      - name: Normalize provision runner env
        shell: bash
        run: |
          set -euo pipefail

          gh_service_token="${GH_SERVICE_TOKEN:-${CONTROL_PLANE_GH_SERVICE_TOKEN:-}}"
          if [[ -z "$gh_service_token" ]]; then
            echo "::error::Missing GH service token. Set GH_SERVICE_TOKEN or CONTROL_PLANE_GH_SERVICE_TOKEN in control-plane Doppler."
            exit 1
          fi
          echo "GH_SERVICE_TOKEN=$gh_service_token" >> "$GITHUB_ENV"

          gh_packages_token="${GH_PACKAGES_TOKEN:-${GITHUB_PACKAGES_TOKEN:-${GITHUB_TOKEN_PACKAGES_READ:-}}}"
          if [[ -z "$gh_packages_token" ]]; then
            echo "::error::Missing GitHub Packages token. Set GH_PACKAGES_TOKEN, GITHUB_PACKAGES_TOKEN, or GITHUB_TOKEN_PACKAGES_READ in control-plane Doppler."
            exit 1
          fi
          echo "GH_PACKAGES_TOKEN=$gh_packages_token" >> "$GITHUB_ENV"

          for key in CONTROL_PLANE_URL PROVISION_API_KEY CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID DOPPLER_API_TOKEN; do
            if [[ -z "${!key:-}" ]]; then
              echo "::error::Missing $key in control-plane Doppler config."
              exit 1
            fi
          done

      - name: Update provision status → cloning
        run: |
          bash scripts/provision-cp-callback.sh post best-effort status "$(
            jq -nc \
              --arg status cloning \
              --arg githubRunId "${GITHUB_RUN_ID}" \
              --arg githubRunUrl "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
              --arg githubRunStatus in_progress \
              '{
                status: $status,
                githubRunId: $githubRunId,
                githubRunUrl: $githubRunUrl,
                githubRunStatus: $githubRunStatus
              }'
          )"

      - name: Clone template source
        run: |
          git clone --depth=1 --branch main \
            "https://x-access-token:${GH_SERVICE_TOKEN}@github.com/narduk-enterprises/narduk-nuxt-template.git" \
            template-source

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: template-source/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Doppler CLI
        run: |
          curl -Ls https://cli.doppler.com/install.sh | sudo sh
          doppler --version

      - name: Configure GitHub Packages auth
        run: |
          cat <<EOF >> "$HOME/.npmrc"
          //npm.pkg.github.com/:_authToken=${GH_PACKAGES_TOKEN}
          EOF

      - name: Install authoring workspace dependencies
        working-directory: template-source
        run: pnpm install --no-frozen-lockfile

      - name: Export starter surface
        working-directory: template-source
        run: pnpm run export:starter -- ../app-source --force

      - name: Sync exported pnpm patch files
        working-directory: template-source
        run: |
          pnpm exec tsx ../tools/provision/sync-exported-pnpm-patches.ts \
            --source-dir=. \
            --target-dir=../app-source

      - name: Validate exported starter surface
        run: |
          required=(
            package.json
            pnpm-workspace.yaml
            provision.json
            SPEC.md
            docs/agents/operations.md
            .github/workflows/provisioned-app-build.md
            tools/sync-copilot-secrets.ts
            apps/web/package.json
            apps/web/nuxt.config.ts
            apps/web/wrangler.json
            apps/web/public/site.webmanifest
          )

          missing=()
          for file in "${required[@]}"; do
            if [[ ! -f "app-source/$file" ]]; then
              missing+=("$file")
            fi
          done

          echo "::group::Starter surface diagnostics"
          find app-source -maxdepth 3 | sort
          echo
          echo "[app-source]"
          ls -la app-source
          echo
          echo "[app-source/apps]"
          ls -la app-source/apps || true
          echo
          echo "[app-source/apps/web]"
          ls -la app-source/apps/web || true
          echo
          if [[ -f app-source/package.json ]]; then
            echo "[app-source/package.json]"
            sed -n '1,120p' app-source/package.json
            echo
          fi
          if [[ -f app-source/apps/web/package.json ]]; then
            echo "[app-source/apps/web/package.json]"
            sed -n '1,160p' app-source/apps/web/package.json
            echo
          fi
          if [[ -f app-source/apps/web/wrangler.json ]]; then
            echo "[app-source/apps/web/wrangler.json]"
            sed -n '1,160p' app-source/apps/web/wrangler.json
            echo
          fi
          echo "::endgroup::"

          if (( ${#missing[@]} > 0 )); then
            message="Starter export missing required files: $(IFS=', '; echo "${missing[*]}")"
            bash scripts/provision-cp-callback.sh post best-effort log "$(jq -nc --arg s starter-export --arg m "$message" '{level:"error",step:$s,message:$m}')"
            echo "::error::$message"
            exit 1
          fi

          bash scripts/provision-cp-callback.sh post best-effort log "$(jq -nc --arg s starter-export --arg m 'Starter export surface validated' '{level:"info",step:$s,message:$m}')"

      - name: Prepare new repository
        run: |
          set -euo pipefail
          cd app-source
          git init
          git remote remove origin >/dev/null 2>&1 || true
          git remote add origin "https://x-access-token:${GH_SERVICE_TOKEN}@github.com/${{ inputs.github-repo }}.git"

          remote_url="$(git remote get-url origin)"
          remote_url_safe="$(printf '%s\n' "$remote_url" | sed -E 's#x-access-token:[^@]+@#x-access-token:***@#')"
          echo "::group::Prepared repository diagnostics"
          pwd
          echo "origin=$remote_url_safe"
          echo "::endgroup::"

      - name: Install generated starter dependencies
        working-directory: app-source
        run: pnpm install --no-frozen-lockfile

      - name: Update provision status → initializing
        run: |
          bash scripts/provision-cp-callback.sh post best-effort status '{"status":"initializing"}'

      - name: Install control-plane dependencies
        run: pnpm install --no-frozen-lockfile

      - name: 0. Preflight Checks
        run: |
          bash scripts/provision-cp-callback.sh post best-effort log "$(jq -nc --arg s preflight --arg m 'Executing preflight checks' '{level:"info",step:$s,message:$m}')"
          pnpm exec tsx tools/provision/0-preflight-check.ts

      - name: 1. Create D1 Database
        env:
          D1_DATABASE_ID: ${{ inputs.d1-database-id }}
        run: |
          bash scripts/provision-cp-callback.sh post best-effort log "$(jq -nc --arg s d1 --arg m 'Creating D1 database' '{level:"info",step:$s,message:$m}')"
          pnpm exec tsx tools/provision/1-create-d1.ts \
            --app-name="${{ inputs.app-name }}" \
            --provision-id="${{ inputs.provision-id }}"

      - name: 1a. Create Workers KV namespaces
        env:
          KV_NAMESPACE_ID: ${{ inputs.kv-namespace-id }}
          KV_PREVIEW_NAMESPACE_ID: ${{ inputs.kv-preview-namespace-id }}
        run: |
          bash scripts/provision-cp-callback.sh post best-effort log "$(jq -nc --arg s kv --arg m 'Creating Workers KV namespaces' '{level:"info",step:$s,message:$m}')"
          pnpm exec tsx tools/provision/1-create-kv.ts \
            --app-name="${{ inputs.app-name }}"

      - name: 1b. Persist D1 + KV inputs for workflow retries
        run: |
          pnpm exec tsx tools/provision/7-persist-dispatch-context.ts \
            --provision-id="${{ inputs.provision-id }}"

      - name: 2. Create Doppler Project
        env:
          NUXT_PORT: ${{ inputs.nuxt-port }}
        run: |
          bash scripts/provision-cp-callback.sh post best-effort log "$(jq -nc --arg s doppler --arg m 'Creating Doppler project' '{level:"info",step:$s,message:$m}')"
          pnpm exec tsx tools/provision/2-create-doppler.ts \
            --app-name="${{ inputs.app-name }}" \
            --app-url="${{ inputs.app-url }}" \
            --display-name="${{ inputs.display-name }}" \
            --nuxt-port="${{ inputs.nuxt-port }}" \
            --provision-id="${{ inputs.provision-id }}"

      - name: 3. Set GitHub Repository Configuration
        run: |
          bash scripts/provision-cp-callback.sh post best-effort log "$(jq -nc --arg s github --arg m 'Setting GitHub secrets and Copilot repository access' '{level:"info",step:$s,message:$m}')"
          pnpm exec tsx tools/provision/3-set-github-secrets.ts \
            --app-name="${{ inputs.app-name }}" \
            --github-repo="${{ inputs.github-repo }}" \
            --provision-id="${{ inputs.provision-id }}"

      - name: 4. Create Analytics
        env:
          GA_PROPERTY_ID: ${{ inputs.ga-property-id }}
          GA_MEASUREMENT_ID: ${{ inputs.ga-measurement-id }}
          INDEXNOW_KEY: ${{ inputs.indexnow-key }}
          GSC_VERIFICATION_FILE: ${{ inputs.gsc-verification-file }}
          GSC_VERIFICATION_CONTENT: ${{ inputs.gsc-verification-content }}
        run: |
          bash scripts/provision-cp-callback.sh post best-effort log "$(jq -nc --arg s analytics --arg m 'Provisioning analytics (GA4/GSC/IndexNow)' '{level:"info",step:$s,message:$m}')"
          pnpm exec tsx tools/provision/4-create-analytics.ts \
            --app-name="${{ inputs.app-name }}" \
            --app-url="${{ inputs.app-url }}" \
            --provision-id="${{ inputs.provision-id }}"

      - name: 4b. Persist analytics inputs for workflow retries
        run: |
          pnpm exec tsx tools/provision/7-persist-dispatch-context.ts \
            --provision-id="${{ inputs.provision-id }}"

      - name: 4.5 Export Doppler PRD env
        run: |
          bash scripts/provision-cp-callback.sh post best-effort log "$(jq -nc --arg s doppler-env --arg m 'Exporting Doppler production env for deploy' '{level:"info",step:$s,message:$m}')"
          pnpm exec tsx tools/provision/6-export-doppler-env.ts \
            --app-name="${{ inputs.app-name }}" \
            --config=prd

      - name: 5. Hydrate Repository
        run: |
          bash scripts/provision-cp-callback.sh post best-effort log "$(jq -nc --arg s hydrate --arg m 'Hydrating repository from template' '{level:"info",step:$s,message:$m}')"
          pnpm exec tsx tools/provision/5-hydrate-repo.ts \
            --app-name="${{ inputs.app-name }}" \
            --display-name="${{ inputs.display-name }}" \
            --app-short-description="${{ inputs.app-short-description }}" \
            --app-description="${{ inputs.app-description }}" \
            --app-url="${{ inputs.app-url }}" \
            --target-dir="app-source" \
            --provision-id="${{ inputs.provision-id }}"

      - name: 7. Generate AI Theme + Splash Page
        if: inputs.app-short-description != '' || inputs.app-description != ''
        continue-on-error: true
        env:
          AI_THEME_DESCRIPTION: ${{ inputs.app-short-description != '' && inputs.app-short-description || inputs.app-description }}
        run: |
          bash scripts/provision-cp-callback.sh post best-effort log "$(jq -nc --arg s ai-theme --arg m 'Generating AI theme, splash landing page, icon, and logo via GPT-5.4 + DALL-E' '{level:"info",step:$s,message:$m}')"
          pnpm exec tsx tools/provision/7-generate-theme.ts \
            --app-name="${{ inputs.app-name }}" \
            --display-name="${{ inputs.display-name }}" \
            --app-description="${AI_THEME_DESCRIPTION}" \
            --app-url="${{ inputs.app-url }}" \
            --target-dir="app-source" \
            --provision-id="${{ inputs.provision-id }}"

      - name: Commit and push
        working-directory: app-source
        run: |
          set -euo pipefail
          bash ../scripts/provision-cp-callback.sh post best-effort log "$(jq -nc --arg s git --arg m 'Committing and pushing initial repository' '{level:"info",step:$s,message:$m}')"
          echo "::group::Commit workspace diagnostics"
          pwd
          ls -la
          ls -la apps || true
          ls -la apps/web || true
          if [[ -f doppler.yaml ]]; then
            echo "[doppler.yaml]"
            sed -n '1,40p' doppler.yaml
          else
            echo "::error::Expected doppler.yaml is missing before commit."
            exit 1
          fi
          echo "::endgroup::"
          git add -A
          git add -f doppler.yaml
          git config user.name "narduk-bot"
          git config user.email "bot@nard.uk"

          if ! remote_url="$(git remote get-url origin 2>/dev/null)"; then
            echo "::error::Git remote 'origin' is not configured in app-source."
            exit 1
          fi

          remote_url_safe="$(printf '%s\n' "$remote_url" | sed -E 's#x-access-token:[^@]+@#x-access-token:***@#')"
          echo "::group::Commit remote configuration"
          echo "origin=$remote_url_safe"
          echo "::endgroup::"

          remote_main_sha="$(git ls-remote --heads origin main | awk '{print $1}')"
          if [[ -n "$remote_main_sha" ]]; then
            git fetch origin main --depth=50
            remote_author="$(git log -1 --pretty='%an' FETCH_HEAD)"
            remote_subject="$(git log -1 --pretty='%s' FETCH_HEAD)"
            remote_commit_count="$(git rev-list --count FETCH_HEAD)"
            allow_bootstrap_override=false
            if [[ "$remote_author" == "narduk-bot" ]] && [[ "$remote_subject" =~ ^chore:\ initialize\ .+\ from\ narduk-nuxt-template$ ]] && [[ "$remote_commit_count" -eq 1 ]]; then
              allow_bootstrap_override=true
            fi
            echo "::group::Remote main diagnostics"
            echo "sha=$remote_main_sha"
            echo "author=$remote_author"
            echo "subject=$remote_subject"
            echo "commit_count=$remote_commit_count"
            echo "allow_bootstrap_override=$allow_bootstrap_override"
            echo "::endgroup::"

            local_tree="$(git write-tree)"
            remote_tree="$(git rev-parse FETCH_HEAD^{tree})"
            echo "::group::Remote tree comparison"
            echo "local_tree=$local_tree"
            echo "remote_tree=$remote_tree"
            echo "::endgroup::"

            if [[ "$local_tree" == "$remote_tree" ]]; then
              echo "Remote main already matches local generated tree. Skipping commit/push and continuing to deploy."
              bash ../scripts/provision-cp-callback.sh post best-effort log "$(jq -nc --arg s git --arg m 'Remote main already matches generated tree; skipping commit/push and continuing to deploy' '{level:"info",step:$s,message:$m}')"
              exit 0
            fi

            if [[ "$allow_bootstrap_override" == "true" ]]; then
              echo "Remote main only contains the bootstrap commit. Overwriting it with the regenerated tree."
              bash ../scripts/provision-cp-callback.sh post best-effort log "$(jq -nc --arg s git --arg m 'Remote main only contains the bootstrap commit; force-pushing regenerated tree for retry recovery' '{level:"info",step:$s,message:$m}')"
              git commit -m "chore: initialize ${{ inputs.app-name }} from narduk-nuxt-template"
              git branch -M main
              git push --force-with-lease origin main
              exit 0
            fi

            echo "::group::Remote vs local diff summary"
            git diff --stat --cached FETCH_HEAD -- || true
            echo
            git diff --name-status --cached FETCH_HEAD -- || true
            echo "::endgroup::"
            echo "Remote main already exists and differs from the generated tree. Preserving remote history and deploying the existing remote main instead."
            bash ../scripts/provision-cp-callback.sh post best-effort log "$(jq -nc --arg s git --arg m 'Remote main differs from regenerated output; preserving existing history and deploying remote main unchanged' '{level:"info",step:$s,message:$m}')"

            cd ..
            rm -rf app-source
            git clone --depth=1 --branch main "$remote_url" app-source

            echo "::group::Existing remote deployment workspace"
            cd app-source
            pwd
            git log -1 --oneline
            ls -la
            ls -la apps || true
            ls -la apps/web || true
            echo "::endgroup::"

            pnpm install --no-frozen-lockfile
            exit 0
          fi
          git commit -m "chore: initialize ${{ inputs.app-name }} from narduk-nuxt-template"
          git branch -M main
          git push -u origin main

      - name: Update provision status → deploying
        run: |
          bash scripts/provision-cp-callback.sh post best-effort status '{"status":"deploying"}'

      - name: Build and deploy
        working-directory: app-source/apps/web
        run: |
          bash ../../../scripts/provision-cp-callback.sh post best-effort log "$(jq -nc --arg s deploy --arg m 'Building and deploying to Cloudflare Workers' '{level:"info",step:$s,message:$m}')"
          echo "::group::Deploy workspace diagnostics"
          pwd
          ls -la
          sed -n '1,120p' package.json
          sed -n '1,120p' wrangler.json
          echo "::endgroup::"
          pnpm build
          pnpm exec wrangler deploy

      - name: Verify GSC ownership (post-deploy)
        working-directory: app-source
        continue-on-error: true
        env:
          INPUT_GSC_VERIFICATION_FILE: ${{ inputs.gsc-verification-file }}
        run: |
          if [ -z "${INPUT_GSC_VERIFICATION_FILE}" ] && [ -z "${GSC_VERIFICATION_FILE:-}" ]; then
            echo "ℹ️ Skipping GSC verification — no verification file was provided or generated."
            exit 0
          fi

          if [ -f "tools/gsc-verify.ts" ]; then
            pnpm exec tsx tools/gsc-verify.ts || echo "⚠️ GSC verification deferred — site may not be live yet"
          fi

      - name: Report success
        if: success()
        env:
          INPUT_APP_URL: ${{ inputs.app-url }}
          INPUT_GITHUB_REPO: ${{ inputs.github-repo }}
        run: bash scripts/provision-cp-callback.sh complete-success

      - name: Report failure
        if: failure()
        env:
          FAILURE_MESSAGE: Provisioning failed in GitHub Actions. Inspect https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash scripts/provision-cp-callback.sh complete-failed
