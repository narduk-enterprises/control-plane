name: Provision App

on:
  workflow_dispatch:
    inputs:
      app-name:
        description: "Lowercase kebab-case app slug (e.g. my-cool-app)"
        required: true
        type: string
      display-name:
        description: "Human-readable display name (e.g. My Cool App)"
        required: true
        type: string
      app-url:
        description: "Production URL (e.g. https://my-cool-app.nard.uk)"
        required: true
        type: string
      nuxt-port:
        description: "Assigned local Nuxt dev port (stored in Doppler dev as NUXT_PORT)"
        required: false
        type: string
        default: ""
      github-repo:
        description: "Full GitHub repo path (e.g. narduk-enterprises/my-cool-app)"
        required: true
        type: string
      provision-id:
        description: "Control plane provision job ID for status callbacks"
        required: true
        type: string
      d1-database-id:
        description: "Pre-provisioned D1 database UUID (skip D1 creation in init.ts)"
        required: false
        type: string
        default: ""
      d1-database-name:
        description: "Pre-provisioned D1 database name"
        required: false
        type: string
        default: ""
      ga-property-id:
        description: "Pre-provisioned GA4 property ID (skip analytics in init.ts)"
        required: false
        type: string
        default: ""
      ga-measurement-id:
        description: "Pre-provisioned GA4 measurement ID (G-XXXXXXX)"
        required: false
        type: string
        default: ""
      gsc-verification-file:
        description: "GSC verification filename (e.g. google1234.html)"
        required: false
        type: string
        default: ""
      gsc-verification-content:
        description: "GSC verification file content"
        required: false
        type: string
        default: ""
      indexnow-key:
        description: "Pre-generated IndexNow API key"
        required: false
        type: string
        default: ""

concurrency:
  group: provision-${{ github.event.inputs.app-name }}
  cancel-in-progress: false

env:
  NUXT_TELEMETRY_DISABLED: 1
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  provision:
    name: "Provision ${{ github.event.inputs.app-name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    steps:
      - name: Validate inputs
        run: |
          if ! echo "${{ inputs.app-name }}" | grep -qP '^[a-z0-9][a-z0-9-]*$'; then
            echo "::error::Invalid app-name: must match /^[a-z0-9][a-z0-9-]*$/"
            exit 1
          fi
          echo "📦 Provisioning: ${{ inputs.display-name }} (${{ inputs.app-name }})"
          echo "   URL: ${{ inputs.app-url }}"
          echo "   Repo: ${{ inputs.github-repo }}"
          echo "   Provision ID: ${{ inputs.provision-id }}"

      - name: Update provision status → cloning
        run: |
          curl -sf -X POST \
            "${{ secrets.CONTROL_PLANE_URL }}/api/fleet/provision/${{ inputs.provision-id }}/status" \
            -H "Authorization: Bearer ${{ secrets.PROVISION_API_KEY }}" \
            -H "Content-Type: application/json" \
            -H "X-Requested-With: XMLHttpRequest" \
            -d '{"status": "cloning"}' \
            || echo "⚠️ Status update failed (non-fatal)"

      - uses: actions/checkout@v4
        with:
          repository: narduk-enterprises/narduk-nuxt-template
          ref: main
          token: ${{ secrets.GH_SERVICE_TOKEN }}
          path: template-source

      - name: Checkout Control Plane
        uses: actions/checkout@v4
        with:
          path: control-plane

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: template-source/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure GitHub Packages auth
        run: |
          cat <<EOF >> "$HOME/.npmrc"
          //npm.pkg.github.com/:_authToken=${{ secrets.GH_PACKAGES_TOKEN }}
          EOF

      - name: Install authoring workspace dependencies
        working-directory: template-source
        run: pnpm install --no-frozen-lockfile

      - name: Export starter surface
        working-directory: template-source
        run: pnpm run export:starter -- ../app-source --force

      - name: Prepare new repository
        run: |
          cd app-source
          git init
          git remote add origin "https://x-access-token:${{ secrets.GH_SERVICE_TOKEN }}@github.com/${{ inputs.github-repo }}.git"

      - name: Install generated starter dependencies
        working-directory: app-source
        run: pnpm install --no-frozen-lockfile

      - name: Update provision status → initializing
        run: |
          curl -sf -X POST \
            "${{ secrets.CONTROL_PLANE_URL }}/api/fleet/provision/${{ inputs.provision-id }}/status" \
            -H "Authorization: Bearer ${{ secrets.PROVISION_API_KEY }}" \
            -H "Content-Type: application/json" \
            -H "X-Requested-With: XMLHttpRequest" \
            -d '{"status": "initializing"}' \
            || echo "⚠️ Status update failed (non-fatal)"

      - name: Install control-plane dependencies
        working-directory: control-plane
        run: pnpm install --no-frozen-lockfile

      - name: 0. Preflight Checks
        working-directory: control-plane
        env:
          CONTROL_PLANE_URL: ${{ secrets.CONTROL_PLANE_URL }}
          PROVISION_API_KEY: ${{ secrets.PROVISION_API_KEY }}
          GH_SERVICE_TOKEN: ${{ secrets.GH_SERVICE_TOKEN }}
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DOPPLER_API_TOKEN: ${{ secrets.DOPPLER_API_TOKEN }}
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          GA_ACCOUNT_ID: ${{ secrets.GA_ACCOUNT_ID }}
        run: |
          curl -sf -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/fleet/provision/${{ inputs.provision-id }}/log" -H "Authorization: Bearer ${{ secrets.PROVISION_API_KEY }}" -H "Content-Type: application/json" -d '{"level": "info", "step": "preflight", "message": "Executing preflight checks"}' || true
          pnpm exec tsx tools/provision/0-preflight-check.ts

      - name: 1. Create D1 Database
        working-directory: control-plane
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_ID: ${{ inputs.d1-database-id }}
        run: |
          curl -sf -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/fleet/provision/${{ inputs.provision-id }}/log" -H "Authorization: Bearer ${{ secrets.PROVISION_API_KEY }}" -H "Content-Type: application/json" -d '{"level": "info", "step": "d1", "message": "Creating D1 database"}' || true
          pnpm exec tsx tools/provision/1-create-d1.ts \
            --app-name="${{ inputs.app-name }}" \
            --provision-id="${{ inputs.provision-id }}"

      - name: 2. Create Doppler Project
        working-directory: control-plane
        env:
          DOPPLER_API_TOKEN: ${{ secrets.DOPPLER_API_TOKEN }}
          NUXT_PORT: ${{ inputs.nuxt-port }}
        run: |
          curl -sf -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/fleet/provision/${{ inputs.provision-id }}/log" -H "Authorization: Bearer ${{ secrets.PROVISION_API_KEY }}" -H "Content-Type: application/json" -d '{"level": "info", "step": "doppler", "message": "Creating Doppler project"}' || true
          pnpm exec tsx tools/provision/2-create-doppler.ts \
            --app-name="${{ inputs.app-name }}" \
            --app-url="${{ inputs.app-url }}" \
            --display-name="${{ inputs.display-name }}" \
            --nuxt-port="${{ inputs.nuxt-port }}" \
            --provision-id="${{ inputs.provision-id }}"

      - name: 3. Set GitHub Secrets
        working-directory: control-plane
        env:
          GH_SERVICE_TOKEN: ${{ secrets.GH_SERVICE_TOKEN }}
          CONTROL_PLANE_GH_SERVICE_TOKEN: ${{ secrets.GH_SERVICE_TOKEN }}
          APP_DOPPLER_TOKEN: ${{ env.APP_DOPPLER_TOKEN }}
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          CONTROL_PLANE_URL: ${{ secrets.CONTROL_PLANE_URL }}
        run: |
          curl -sf -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/fleet/provision/${{ inputs.provision-id }}/log" -H "Authorization: Bearer ${{ secrets.PROVISION_API_KEY }}" -H "Content-Type: application/json" -d '{"level": "info", "step": "github", "message": "Setting GitHub secrets"}' || true
          pnpm exec tsx tools/provision/3-set-github-secrets.ts \
            --app-name="${{ inputs.app-name }}" \
            --github-repo="${{ inputs.github-repo }}" \
            --provision-id="${{ inputs.provision-id }}"

      - name: 4. Create Analytics
        working-directory: control-plane
        env:
          GA_PROPERTY_ID: ${{ inputs.ga-property-id }}
          GA_MEASUREMENT_ID: ${{ inputs.ga-measurement-id }}
          INDEXNOW_KEY: ${{ inputs.indexnow-key }}
          GSC_VERIFICATION_FILE: ${{ inputs.gsc-verification-file }}
          GSC_VERIFICATION_CONTENT: ${{ inputs.gsc-verification-content }}
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          GA_ACCOUNT_ID: ${{ secrets.GA_ACCOUNT_ID }}
          DOPPLER_API_TOKEN: ${{ secrets.DOPPLER_API_TOKEN }}
        run: |
          curl -sf -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/fleet/provision/${{ inputs.provision-id }}/log" -H "Authorization: Bearer ${{ secrets.PROVISION_API_KEY }}" -H "Content-Type: application/json" -d '{"level": "info", "step": "analytics", "message": "Provisioning analytics (GA4/GSC/IndexNow)"}' || true
          pnpm exec tsx tools/provision/4-create-analytics.ts \
            --app-name="${{ inputs.app-name }}" \
            --app-url="${{ inputs.app-url }}" \
            --provision-id="${{ inputs.provision-id }}"

      - name: 4.5 Export Doppler PRD env
        working-directory: control-plane
        env:
          APP_DOPPLER_TOKEN: ${{ env.APP_DOPPLER_TOKEN }}
        run: |
          curl -sf -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/fleet/provision/${{ inputs.provision-id }}/log" -H "Authorization: Bearer ${{ secrets.PROVISION_API_KEY }}" -H "Content-Type: application/json" -d '{"level": "info", "step": "doppler-env", "message": "Exporting Doppler production env for deploy"}' || true
          pnpm exec tsx tools/provision/6-export-doppler-env.ts \
            --app-name="${{ inputs.app-name }}" \
            --config=prd

      - name: 5. Hydrate Repository
        working-directory: control-plane
        run: |
          curl -sf -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/fleet/provision/${{ inputs.provision-id }}/log" -H "Authorization: Bearer ${{ secrets.PROVISION_API_KEY }}" -H "Content-Type: application/json" -d '{"level": "info", "step": "hydrate", "message": "Hydrating repository from template"}' || true
          pnpm exec tsx tools/provision/5-hydrate-repo.ts \
            --app-name="${{ inputs.app-name }}" \
            --display-name="${{ inputs.display-name }}" \
            --app-url="${{ inputs.app-url }}" \
            --target-dir="../app-source" \
            --provision-id="${{ inputs.provision-id }}"

      - name: Commit and push
        working-directory: app-source
        run: |
          curl -sf -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/fleet/provision/${{ inputs.provision-id }}/log" -H "Authorization: Bearer ${{ secrets.PROVISION_API_KEY }}" -H "Content-Type: application/json" -d '{"level": "info", "step": "git", "message": "Committing and pushing initial repository"}' || true
          git add -A
          git add -f doppler.yaml
          git config user.name "narduk-bot"
          git config user.email "bot@nard.uk"
          git commit -m "chore: initialize ${{ inputs.app-name }} from narduk-nuxt-template"
          git branch -M main
          git push --force -u origin main

      - name: Update provision status → deploying
        run: |
          curl -sf -X POST \
            "${{ secrets.CONTROL_PLANE_URL }}/api/fleet/provision/${{ inputs.provision-id }}/status" \
            -H "Authorization: Bearer ${{ secrets.PROVISION_API_KEY }}" \
            -H "Content-Type: application/json" \
            -H "X-Requested-With: XMLHttpRequest" \
            -d '{"status": "deploying"}' \
            || echo "⚠️ Status update failed (non-fatal)"

      - name: Build and deploy
        working-directory: app-source/apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          curl -sf -X POST "${{ secrets.CONTROL_PLANE_URL }}/api/fleet/provision/${{ inputs.provision-id }}/log" -H "Authorization: Bearer ${{ secrets.PROVISION_API_KEY }}" -H "Content-Type: application/json" -d '{"level": "info", "step": "deploy", "message": "Building and deploying to Cloudflare Workers"}' || true
          pnpm build
          pnpm exec wrangler deploy

      - name: Verify GSC ownership (post-deploy)
        if: env.GSC_VERIFICATION_FILE != ''
        working-directory: app-source
        continue-on-error: true
        run: |
          if [ -f "tools/gsc-verify.ts" ]; then
            pnpm exec tsx tools/gsc-verify.ts || echo "⚠️ GSC verification deferred — site may not be live yet"
          fi

      - name: Report success
        if: success()
        run: |
          curl -sf -X POST \
            "${{ secrets.CONTROL_PLANE_URL }}/api/fleet/provision/${{ inputs.provision-id }}/complete" \
            -H "Authorization: Bearer ${{ secrets.PROVISION_API_KEY }}" \
            -H "Content-Type: application/json" \
            -H "X-Requested-With: XMLHttpRequest" \
            -d "{
              \"status\": \"complete\",
              \"deployedUrl\": \"${{ inputs.app-url }}\",
              \"githubRepo\": \"${{ inputs.github-repo }}\",
              \"gaPropertyId\": \"${{ env.GA_PROPERTY_ID }}\",
              \"gaMeasurementId\": \"${{ env.GA_MEASUREMENT_ID }}\"
            }"

      - name: Report failure
        if: failure()
        run: |
          curl -sf -X POST \
            "${{ secrets.CONTROL_PLANE_URL }}/api/fleet/provision/${{ inputs.provision-id }}/complete" \
            -H "Authorization: Bearer ${{ secrets.PROVISION_API_KEY }}" \
            -H "Content-Type: application/json" \
            -H "X-Requested-With: XMLHttpRequest" \
            -d "{
              \"status\": \"failed\",
              \"errorMessage\": \"Provisioning failed — check GitHub Actions logs for ${{ github.run_id }}\"
            }"
