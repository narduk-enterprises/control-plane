name: Provision Post-Step-7 Tail

on:
  workflow_dispatch:
    inputs:
      app-name:
        description: "Lowercase kebab-case app slug (e.g. my-cool-app)"
        required: true
        type: string
      app-url:
        description: "Production URL (e.g. https://my-cool-app.nard.uk)"
        required: true
        type: string
      github-repo:
        description: "Full GitHub repo path (e.g. narduk-enterprises/my-cool-app)"
        required: true
        type: string
      github-ref:
        description: "Branch or ref to deploy from the target repo"
        required: false
        type: string
        default: main
      provision-id:
        description: "Optional control-plane provision job ID for callbacks"
        required: false
        type: string
        default: ""

concurrency:
  group: provision-tail-${{ github.event.inputs.app-name }}
  cancel-in-progress: false

env:
  NUXT_TELEMETRY_DISABLED: 1
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  tail:
    name: "Provision tail for ${{ github.event.inputs.app-name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    env:
      PROVISION_ID: ${{ inputs.provision-id }}
    steps:
      - name: Validate inputs
        run: |
          set -euo pipefail

          if ! echo "${{ inputs.app-name }}" | grep -qP '^[a-z0-9][a-z0-9-]*$'; then
            echo "::error::Invalid app-name: must match /^[a-z0-9][a-z0-9-]*$/"
            exit 1
          fi

          if ! echo "${{ inputs.github-repo }}" | grep -qP '^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$'; then
            echo "::error::Invalid github-repo: must look like owner/repo"
            exit 1
          fi

          echo "Testing post-Step-7 tail for ${{ inputs.app-name }}"
          echo "   URL: ${{ inputs.app-url }}"
          echo "   Repo: ${{ inputs.github-repo }}"
          echo "   Ref: ${{ inputs.github-ref }}"
          echo "   Provision ID: ${PROVISION_ID:-<none>}"

      - uses: actions/checkout@v4

      - name: Fetch control-plane secrets from Doppler
        uses: dopplerhq/secrets-fetch-action@v2.0.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          inject-env-vars: true

      - name: Normalize provision runner env
        shell: bash
        run: |
          set -euo pipefail

          gh_service_token="${GH_SERVICE_TOKEN:-${CONTROL_PLANE_GH_SERVICE_TOKEN:-}}"
          if [[ -z "$gh_service_token" ]]; then
            echo "::error::Missing GH service token. Set GH_SERVICE_TOKEN or CONTROL_PLANE_GH_SERVICE_TOKEN in control-plane Doppler."
            exit 1
          fi
          echo "GH_SERVICE_TOKEN=$gh_service_token" >> "$GITHUB_ENV"

          gh_packages_token="${GH_PACKAGES_TOKEN:-${GITHUB_PACKAGES_TOKEN:-${GITHUB_TOKEN_PACKAGES_READ:-}}}"
          if [[ -z "$gh_packages_token" ]]; then
            echo "::error::Missing GitHub Packages token. Set GH_PACKAGES_TOKEN, GITHUB_PACKAGES_TOKEN, or GITHUB_TOKEN_PACKAGES_READ in control-plane Doppler."
            exit 1
          fi
          echo "GH_PACKAGES_TOKEN=$gh_packages_token" >> "$GITHUB_ENV"

          for key in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID DOPPLER_API_TOKEN; do
            if [[ -z "${!key:-}" ]]; then
              echo "::error::Missing $key in control-plane Doppler config."
              exit 1
            fi
          done

          if [[ -n "${PROVISION_ID:-}" ]]; then
            for key in CONTROL_PLANE_URL PROVISION_API_KEY; do
              if [[ -z "${!key:-}" ]]; then
                echo "::error::Missing $key in control-plane Doppler config."
                exit 1
              fi
            done
          fi

      - name: Announce tail run
        run: |
          if [[ -n "${PROVISION_ID:-}" ]]; then
            bash scripts/provision-cp-callback.sh post best-effort log "$(
              jq -nc \
                --arg s tail \
                --arg m "Running post-Step-7 tail workflow against ${{ inputs.github-repo }}@${{ inputs.github-ref }}" \
                '{level:"info",step:$s,message:$m}'
            )"
          fi

      - name: Update provision status → deploying
        if: inputs.provision-id != ''
        run: |
          bash scripts/provision-cp-callback.sh post best-effort status "$(
            jq -nc \
              --arg status deploying \
              --arg githubRunId "${GITHUB_RUN_ID}" \
              --arg githubRunUrl "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
              --arg githubRunStatus in_progress \
              '{
                status: $status,
                githubRunId: $githubRunId,
                githubRunUrl: $githubRunUrl,
                githubRunStatus: $githubRunStatus
              }'
          )"

      - name: Clone target app repository
        run: |
          set -euo pipefail

          git clone --depth=1 --branch "${{ inputs.github-ref }}" \
            "https://x-access-token:${GH_SERVICE_TOKEN}@github.com/${{ inputs.github-repo }}.git" \
            app-source

          echo "::group::Target repository diagnostics"
          cd app-source
          pwd
          git log -1 --oneline
          ls -la
          ls -la apps || true
          ls -la apps/web || true
          echo "::endgroup::"

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: app-source/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure GitHub Packages auth
        run: |
          cat <<EOF >> "$HOME/.npmrc"
          //npm.pkg.github.com/:_authToken=${GH_PACKAGES_TOKEN}
          EOF

      - name: Install control-plane dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install target repository dependencies
        working-directory: app-source
        run: pnpm install --no-frozen-lockfile

      - name: Export Doppler PRD env
        run: |
          if [[ -n "${PROVISION_ID:-}" ]]; then
            bash scripts/provision-cp-callback.sh post best-effort log "$(jq -nc --arg s doppler-env --arg m 'Exporting Doppler production env for post-Step-7 tail workflow' '{level:"info",step:$s,message:$m}')"
          fi
          pnpm exec tsx tools/provision/6-export-doppler-env.ts \
            --app-name="${{ inputs.app-name }}" \
            --config=prd

      - name: Build and deploy
        working-directory: app-source/apps/web
        run: |
          if [[ -n "${PROVISION_ID:-}" ]]; then
            bash ../../../scripts/provision-cp-callback.sh post best-effort log "$(jq -nc --arg s deploy --arg m 'Building and deploying target repository from post-Step-7 tail workflow' '{level:"info",step:$s,message:$m}')"
          fi
          echo "::group::Deploy workspace diagnostics"
          pwd
          ls -la
          sed -n '1,120p' package.json
          sed -n '1,120p' wrangler.json
          echo "::endgroup::"
          pnpm build
          pnpm exec wrangler deploy

      - name: Verify GSC ownership (post-deploy)
        working-directory: app-source
        continue-on-error: true
        run: |
          if [ -z "${GSC_VERIFICATION_FILE:-}" ]; then
            echo "Skipping GSC verification: GSC_VERIFICATION_FILE is not set."
            exit 0
          fi

          if [ -f "tools/gsc-verify.ts" ]; then
            pnpm exec tsx tools/gsc-verify.ts || echo "GSC verification deferred: site may not be live yet"
          fi

      - name: Report success
        if: success() && inputs.provision-id != ''
        env:
          INPUT_APP_URL: ${{ inputs.app-url }}
          INPUT_GITHUB_REPO: ${{ inputs.github-repo }}
        run: bash scripts/provision-cp-callback.sh complete-success

      - name: Report failure
        if: failure() && inputs.provision-id != ''
        env:
          FAILURE_MESSAGE: Post-Step-7 tail workflow failed in GitHub Actions. Inspect https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash scripts/provision-cp-callback.sh complete-failed
